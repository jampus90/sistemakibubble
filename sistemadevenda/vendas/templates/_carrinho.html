{% if carrinho %}
<table class="table table-sm">
  <thead>
    <tr>
      <th>Produto</th>
      <th class="text-center">Qtd</th>
      <th class="text-end">Subtotal</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for produto_id, item in carrinho.items %}
    <tr>
      <td>{{ item.nome }}</td>
      <td class="text-center">{{ item.quantidade }}</td>
      <td class="text-end">R$ {{ item.preco|floatformat:2 }}</td>
      <td>
        <form hx-post="{% url 'pdv_remover' produto_id %}"
              hx-target="#carrinho"
              hx-swap="innerHTML">
          {% csrf_token %}
          <button type="submit" class="btn btn-sm btn-outline-danger">&times;</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
  <tfoot>
    <tr>
      <td colspan="2"><strong>Total</strong></td>
      <td class="text-end"><strong>R$ {{ total|floatformat:2 }}</strong></td>
      <td></td>
    </tr>
  </tfoot>
</table>

<form method="post" action="{% url 'pdv_finalizar' %}">
  {% csrf_token %}
  <div class="mb-2">
    <input type="tel" name="numero_wpp" class="form-control form-control-sm"
           placeholder="WhatsApp do cliente (opcional, ex: 5511999998888)">
  </div>
  <button type="submit" class="btn btn-success w-100">Finalizar Venda</button>
</form>
{% else %}
<p class="text-muted">Carrinho vazio.</p>
{% endif %}
